name: Banciu Nicolae
role: General Manager
company: Meesenburg România
quote: "Along with the Neurony team, we implemented an AI solution for the automated processing of orders received via email, and the results have been very positive. The system can process both orders written directly in the email body as well as orders attached in various formats, including handwritten documents. The solution was implemented at the end of last year, and we are currently able to automatically process approximately 50% of the orders received by email. The impact on the order processing department has been significant: reduced workload, time savings, and a substantial decrease in human error."
